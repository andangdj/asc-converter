name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm install

      - name: Generate Changelog
        shell: pwsh
        run: |
          $prevTag = git tag --sort=-creatordate | Select-String -Pattern "^v" | Select-Object -First 2 | Select-Object -Last 1
          if ($prevTag) {
            $changelog = git log --oneline --no-merges "$prevTag..HEAD" | ForEach-Object { "- $_" }
            if (-not $changelog) { $changelog = "- (no changes)" }
          } else {
            $changelog = "🚀 Initial release"
          }
          $changelog | Out-File -FilePath changelog.txt -Encoding utf8
          Write-Output "CHANGELOG<<EOF" >> $env:GITHUB_ENV
          Get-Content changelog.txt >> $env:GITHUB_ENV
          Write-Output "EOF" >> $env:GITHUB_ENV

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ${{ env.CHANGELOG }}
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
