name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm install

      - name: Generate Changelog
        shell: pwsh
        run: |
          $currentTag = "${{ github.ref_name }}"
          $prevTag = git tag --sort=-creatordate | Where-Object { $_ -match "^v" -and $_ -ne $currentTag } | Select-Object -First 1
          if ($prevTag) {
            $changelog = git log --oneline --no-merges "$prevTag..$currentTag" | ForEach-Object { "- $_" }
            if (-not $changelog) { $changelog = "- $currentTag" }
          } else {
            $changelog = "🚀 Initial release`n`n$(git log --oneline --no-merges $currentTag | ForEach-Object { "- $_" })"
          }
          $changelog | Out-File -FilePath changelog.txt -Encoding utf8
          Write-Output "CHANGELOG<<EOF" >> $env:GITHUB_ENV
          Get-Content changelog.txt >> $env:GITHUB_ENV
          Write-Output "EOF" >> $env:GITHUB_ENV

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ${{ env.CHANGELOG }}
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
